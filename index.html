<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>جمعيتي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0D0D0D;--ink3:#888;
  --paper:#F5F4F0;--white:#FFF;
  --teal:#00C9A7;--teal-dk:#009E84;--teal-bg:#E6FAF7;
  --red:#FF4757;--red-bg:#FFF0F1;
  --amber-bg:#FFF8E6;
  --line:#E8E6E0;--r:16px;--rs:10px;
}
html,body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--paper);color:var(--ink)}
.shell{max-width:430px;width:100%;margin:0 auto;position:relative}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 16px 10px;display:flex;align-items:center;gap:10px;background:var(--paper);max-width:430px;margin:0 auto;border-bottom:1px solid var(--line)}
.topbar-spacer{height:58px}
.tb-back{width:36px;height:36px;border-radius:50%;background:var(--white);border:1px solid var(--line);display:none;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--ink)}
.tb-back.on{display:flex}
.tb-title{font-size:19px;font-weight:700;color:var(--ink);flex:1}
.tb-sub{font-size:12px;color:var(--ink3)}

/* BODY */
.body{overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 14px 20px;min-height:100vh}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;background:var(--white);border-top:1.5px solid var(--line);padding-bottom:env(safe-area-inset-bottom,0px)}
.bnav-spacer{height:calc(70px + env(safe-area-inset-bottom,0px))}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0;border:none;background:none;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:10px;font-weight:600;color:var(--ink3);transition:color .15s}
.bnav-btn svg{width:22px;height:22px;transition:transform .15s}
.bnav-btn.on{color:var(--teal-dk)}
.bnav-btn.on svg{transform:scale(1.1)}
.bnav-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);display:none;margin-top:1px}
.bnav-btn.on .bnav-dot{display:block}

/* PAGES */
.page{display:none}.page.on{display:block}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:12px;color:var(--ink3);font-size:14px}
.spin{width:28px;height:28px;border:2.5px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* KPI */
.kpi{background:var(--ink);border-radius:20px;padding:20px 18px;margin-bottom:16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(0,201,167,.1);top:-50px;left:-50px}
.kpi-eye{font-size:10px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1.2px;margin-bottom:6px}
.kpi-n{font-size:44px;font-weight:700;color:var(--white);line-height:1;margin-bottom:3px}
.kpi-d{font-size:12px;color:rgba(255,255,255,.5)}
.kpi-chips{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.kpi-chip{background:rgba(255,255,255,.1);border-radius:99px;padding:4px 11px;font-size:11px;color:rgba(255,255,255,.7)}
.kpi-chip b{color:var(--teal)}
.sec-lbl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.8px;margin-bottom:9px}

/* JAM CARD */
.jcard{background:var(--white);border-radius:var(--r);padding:15px;margin-bottom:10px;cursor:pointer;border:1px solid var(--line);position:relative;overflow:hidden;transition:transform .12s;-webkit-user-select:none;user-select:none}
.jcard:active{transform:scale(.98)}
.jcard-bar{position:absolute;top:0;right:0;width:4px;height:100%;background:var(--teal)}
.jcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.jcard-name{font-size:15px;font-weight:700}
.jcard-pill{background:var(--teal-bg);color:var(--teal-dk);font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px}
.jcard-meta{display:flex;gap:14px;margin-bottom:11px}
.jmeta-v{font-size:14px;font-weight:700}
.jmeta-k{font-size:10px;color:var(--ink3);font-weight:500;margin-top:1px}
.pbar{height:4px;background:var(--line);border-radius:99px;overflow:hidden}
.pbar-f{height:100%;background:var(--teal);border-radius:99px;transition:width .4s}
.pbar-row{display:flex;justify-content:space-between;margin-top:5px}
.pbar-pct{font-size:11px;font-weight:700;color:var(--teal-dk)}
.pbar-fr{font-size:11px;color:var(--ink3)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px}
.empty-c{width:68px;height:68px;border-radius:50%;background:var(--white);border:1px solid var(--line);margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.empty-c svg{width:30px;height:30px;stroke:var(--ink3);stroke-width:1.5;fill:none}
.empty-h{font-size:16px;font-weight:700;margin-bottom:5px}
.empty-p{font-size:13px;color:var(--ink3);line-height:1.6}

/* FORM */
.fblock{background:var(--white);border-radius:var(--r);border:1px solid var(--line);margin-bottom:12px;overflow:hidden}
.fblock-head{padding:13px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.fblock-icon{width:28px;height:28px;border-radius:8px;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fblock-icon svg{width:15px;height:15px;stroke:var(--teal-dk);stroke-width:2;fill:none}
.fblock-title{font-size:13px;font-weight:700}
.fblock-body{padding:14px}
.field{margin-bottom:13px}.field:last-child{margin-bottom:0}
.flabel{font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:5px;letter-spacing:.4px}
.finput{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:var(--rs);background:var(--paper);color:var(--ink);font-size:15px;font-family:'IBM Plex Sans Arabic',sans-serif;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
.finput:focus{border-color:var(--teal);background:var(--white)}
.finput::placeholder{color:var(--ink3);font-size:14px}

/* MEMBER ROW */
.mlist{display:flex;flex-direction:column;gap:7px;margin-bottom:11px}
.mrow{display:flex;gap:7px;align-items:center}
.midx{width:27px;height:27px;border-radius:7px;background:var(--paper);border:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink3)}
.mrow input{flex:1;padding:10px 11px;border:1.5px solid var(--line);border-radius:var(--rs);background:var(--paper);color:var(--ink);font-size:14px;font-family:'IBM Plex Sans Arabic',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .15s}
.mrow input:focus{border-color:var(--teal);background:var(--white)}
.mdel{width:33px;height:33px;border-radius:8px;background:var(--red-bg);border:1px solid #FFD0D4;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.mdel svg{width:14px;height:14px;stroke:var(--red);stroke-width:2;fill:none}

/* BUTTONS */
.btn-add{width:100%;padding:11px;border:1.5px dashed var(--teal);border-radius:var(--rs);background:var(--teal-bg);color:var(--teal-dk);font-size:13px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:13px}
.btn-add svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}
.btn-main{width:100%;padding:15px;border:none;border-radius:var(--r);background:var(--ink);color:var(--white);font-size:15px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;-webkit-appearance:none;transition:opacity .15s}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.btn-main svg{width:17px;height:17px;stroke:var(--white);stroke-width:2;fill:none}

/* DETAIL */
.dtop{background:var(--ink);border-radius:20px;padding:22px 18px;margin-bottom:14px}
.dtop-name{font-size:21px;font-weight:700;color:var(--white);margin-bottom:3px}
.dtop-sub{font-size:12px;color:rgba(255,255,255,.45)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.sbox{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px}
.sbox-n{font-size:22px;font-weight:700;color:var(--ink)}
.sbox-l{font-size:10px;color:var(--ink3);font-weight:600;margin-top:2px}
.sbox.teal .sbox-n{color:var(--teal-dk)}

/* TABLE BLOCK */
.tblock{background:var(--white);border-radius:var(--r);border:1px solid var(--line);overflow:hidden;margin-bottom:14px}
.thead-row{padding:13px 15px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px}
.thead-t{font-size:13px;font-weight:700;flex:1}

/* EDIT / SAVE BUTTONS */
.btn-edit{
  display:flex;align-items:center;gap:5px;
  padding:7px 13px;border-radius:99px;
  border:1.5px solid var(--line);
  background:var(--white);color:var(--ink);
  font-size:12px;font-weight:700;
  font-family:'IBM Plex Sans Arabic',sans-serif;
  cursor:pointer;white-space:nowrap;
  transition:background .15s,border-color .15s;
}
.btn-edit svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
.btn-edit:hover{background:var(--paper)}

.btn-save{
  display:flex;align-items:center;gap:5px;
  padding:7px 13px;border-radius:99px;
  border:none;
  background:var(--teal);color:var(--white);
  font-size:12px;font-weight:700;
  font-family:'IBM Plex Sans Arabic',sans-serif;
  cursor:pointer;white-space:nowrap;
  transition:opacity .15s;
}
.btn-save svg{width:13px;height:13px;stroke:var(--white);stroke-width:2.5;fill:none}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

.btn-cancel{
  display:flex;align-items:center;gap:5px;
  padding:7px 11px;border-radius:99px;
  border:1.5px solid var(--line);
  background:var(--white);color:var(--ink3);
  font-size:12px;font-weight:700;
  font-family:'IBM Plex Sans Arabic',sans-serif;
  cursor:pointer;white-space:nowrap;
}
.thead-actions{display:flex;gap:6px;align-items:center}

/* EDIT MODE BANNER */
.edit-banner{
  background:var(--amber-bg);border-bottom:1px solid #FFE0A0;
  padding:8px 15px;font-size:12px;color:#8a6000;font-weight:600;
  display:none;align-items:center;gap:6px;
}
.edit-banner.on{display:flex}
.edit-banner svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}

/* TABLE */
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:220px}
th{background:var(--paper);padding:9px 7px;text-align:center;font-size:10px;font-weight:700;color:var(--ink3);border-bottom:1px solid var(--line);white-space:nowrap}
th:first-child{text-align:right;padding-right:13px;min-width:75px}
td{padding:11px 7px;text-align:center;border-bottom:1px solid var(--line);font-size:12px}
td:first-child{text-align:right;padding-right:13px;font-weight:600;white-space:nowrap;font-size:11px}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#FAFAF8}

/* CELL STATES */
.pcell{font-size:20px;line-height:1;display:block;padding:4px;border-radius:6px;transition:background .1s}
/* view mode: not clickable */
.pcell.view-mode{cursor:default}
/* edit mode: clickable + highlight changed */
.pcell.edit-mode{cursor:pointer}
.pcell.edit-mode:active{background:rgba(0,201,167,.15)}
.pcell.changed{background:rgba(0,201,167,.12);border-radius:6px}

.rcv{background:var(--amber-bg);color:#8a6000;font-size:10px;font-weight:700;padding:3px 6px;border-radius:5px;border:1px solid #ffd97d;display:inline-block;white-space:nowrap}
.ok-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--teal);margin-left:4px;vertical-align:2px}

/* DELETE */
.btn-del{width:100%;padding:13px;border-radius:var(--r);background:var(--red-bg);border:1px solid #FFD0D4;color:var(--red);font-size:14px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:24px;-webkit-appearance:none}
.btn-del svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}

/* TOAST */
#toast{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--white);padding:9px 18px;border-radius:99px;font-size:13px;font-weight:600;font-family:'IBM Plex Sans Arabic',sans-serif;opacity:0;pointer-events:none;z-index:9999;white-space:nowrap;transition:opacity .2s ease,transform .2s ease;box-shadow:0 3px 16px rgba(0,0,0,.22)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <button class="tb-back" id="tb-back" onclick="goBack()" aria-label="رجوع">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div style="flex:1;min-width:0">
      <div class="tb-title" id="tb-title">جمعيتي</div>
      <div class="tb-sub" id="tb-sub"></div>
    </div>
  </div>
  <div class="topbar-spacer"></div>

  <div class="body" id="body">

    <!-- HOME -->
    <div class="page on" id="pg-home">
      <div class="kpi">
        <div class="kpi-eye">JAMIYA</div>
        <div class="kpi-n" id="kpi-n">—</div>
        <div class="kpi-d" id="kpi-d">جاري التحميل...</div>
        <div class="kpi-chips" id="kpi-chips"></div>
      </div>
      <div class="sec-lbl">الجمعيات</div>
      <div id="jlist"><div class="loader"><div class="spin"></div>جاري التحميل...</div></div>
      <div id="empty" class="empty" style="display:none">
        <div class="empty-c"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <div class="empty-h">ابدأ جمعيتك الأولى</div>
        <div class="empty-p">أضف الأعضاء وحدد المبلغ<br>وتابع الدفعات بضغطة</div>
      </div>
    </div>

    <!-- CREATE -->
    <div class="page" id="pg-create">
      <div class="fblock">
        <div class="fblock-head">
          <div class="fblock-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg></div>
          <div class="fblock-title">معلومات الجمعية</div>
        </div>
        <div class="fblock-body">
          <div class="field"><label class="flabel">الاسم</label><input class="finput" id="f-name" type="text" placeholder="جمعية 2025" autocomplete="off"></div>
          <div class="field"><label class="flabel">المبلغ الشهري للعضو</label><input class="finput" id="f-amount" type="number" min="1" inputmode="numeric" placeholder="500"></div>
          <div class="field"><label class="flabel">شهر البداية</label><input class="finput" id="f-start" type="month"></div>
        </div>
      </div>
      <div class="fblock">
        <div class="fblock-head">
          <div class="fblock-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
          <div class="fblock-title">الأعضاء — الترتيب هو ترتيب الاستلام</div>
        </div>
        <div class="fblock-body">
          <div class="mlist" id="mlist"></div>
          <button class="btn-add" onclick="addMember()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            إضافة عضو
          </button>
          <button class="btn-main" id="btn-create" onclick="createJam()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            إنشاء الجمعية
          </button>
        </div>
      </div>
    </div>

    <!-- DETAIL -->
    <div class="page" id="pg-detail"></div>

  </div>

  <div class="bnav-spacer"></div>
  <nav class="bnav">
    <button class="bnav-btn on" id="bn-home" onclick="nav('home')" aria-label="الرئيسية">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      الرئيسية
      <div class="bnav-dot"></div>
    </button>
    <button class="bnav-btn" id="bn-create" onclick="nav('create')" aria-label="جمعية جديدة">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      جديدة
      <div class="bnav-dot"></div>
    </button>
  </nav>

</div>
<div id="toast"></div>

<script>
var SUPA_URL = 'https://kypuvouvozgnebicnkty.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5cHV2b3V2b3pnbmViaWNua3R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDg2OTgsImV4cCI6MjA5Nzk4NDY5OH0.jiiGjkdCZOI7ZiU4oqwd1sAHWGlfuT6vTmC3isQ9c00';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);

var MN = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
var mbrs = ['','',''];
var curJam = null;
var payCache = {};      // saved state from DB
var editCache = {};     // working copy during edit mode
var isEditMode = false;

/* ── TOAST ── */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.classList.remove('on'); }, 2200);
}

/* ── NAV ── */
function nav(p) {
  if (isEditMode) { if (!confirm('لديك تعديلات غير محفوظة، هل تريد الخروج؟')) return; }
  isEditMode = false;
  document.getElementById('bn-home').classList.toggle('on', p === 'home');
  document.getElementById('bn-create').classList.toggle('on', p === 'create');
  showPage(p);
  window.scrollTo(0, 0);
  if (p === 'home') { setTop('جمعيتي', '', false); loadHome(); }
  if (p === 'create') { setTop('جمعية جديدة', '', false); }
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(function(el) { el.classList.remove('on'); });
  document.getElementById('pg-' + p).classList.add('on');
  document.getElementById('tb-back').classList.toggle('on', p === 'detail');
}

function setTop(title, sub, showBack) {
  document.getElementById('tb-title').textContent = title;
  document.getElementById('tb-sub').textContent = sub;
  document.getElementById('tb-back').classList.toggle('on', showBack);
}

function goBack() {
  if (isEditMode) { if (!confirm('لديك تعديلات غير محفوظة، هل تريد الخروج؟')) return; }
  isEditMode = false;
  nav('home');
}

/* ── HELPERS ── */
function buildMonths(j) {
  return j.members.map(function(_, i) {
    var d = new Date(j.start_month + '-01');
    d.setMonth(d.getMonth() + i);
    return { year: d.getFullYear(), month: d.getMonth() + 1, receiver: i };
  });
}

function calcStats(j, months, cache) {
  var total = months.length * (j.members.length - 1);
  var paid = 0;
  months.forEach(function(mo, mi) {
    j.members.forEach(function(_, xi) {
      if (xi !== mo.receiver && cache[mi + '_' + xi]) paid++;
    });
  });
  return { total: total, paid: paid, pct: total ? Math.round(paid / total * 100) : 0 };
}

/* ── HOME ── */
async function loadHome() {
  var list = document.getElementById('jlist');
  var empty = document.getElementById('empty');
  list.innerHTML = '<div class="loader"><div class="spin"></div>جاري التحميل...</div>';
  empty.style.display = 'none';

  var result = await sb.from('jamiya').select('*').order('created_at', { ascending: false });
  if (result.error) { list.innerHTML = '<div class="loader">فشل التحميل</div>'; return; }
  var jams = result.data;

  document.getElementById('kpi-n').textContent = jams.length;
  if (!jams.length) {
    document.getElementById('kpi-d').textContent = 'لا توجد جمعيات بعد';
    document.getElementById('kpi-chips').innerHTML = '';
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  var totalM = jams.reduce(function(a, j) { return a + j.members.length; }, 0);
  document.getElementById('kpi-d').textContent = jams.length === 1 ? 'جمعية واحدة نشطة' : jams.length + ' جمعيات نشطة';
  document.getElementById('kpi-chips').innerHTML = '<div class="kpi-chip"><b>' + totalM + '</b> عضو</div>';

  var ids = jams.map(function(j) { return j.id; });
  var pRes = await sb.from('payments').select('*').in('jamiya_id', ids);
  var payMap = {};
  (pRes.data || []).forEach(function(p) { payMap[p.jamiya_id + '_' + p.month_index + '_' + p.member_index] = p.paid; });

  list.innerHTML = '';
  empty.style.display = 'none';

  jams.forEach(function(j) {
    var months = buildMonths(j);
    var localCache = {};
    months.forEach(function(mo, mi) {
      j.members.forEach(function(_, xi) {
        var v = payMap[j.id + '_' + mi + '_' + xi];
        localCache[mi + '_' + xi] = v || false;
      });
    });
    var stats = calcStats(j, months, localCache);
    var fund = (j.members.length - 1) * j.amount;
    var div = document.createElement('div');
    div.className = 'jcard';
    div.innerHTML =
      '<div class="jcard-bar"></div>' +
      '<div class="jcard-top"><div class="jcard-name">' + j.name + '</div><div class="jcard-pill">' + Number(j.amount).toLocaleString('ar') + ' ر.س</div></div>' +
      '<div class="jcard-meta">' +
        '<div><div class="jmeta-v">' + j.members.length + '</div><div class="jmeta-k">أعضاء</div></div>' +
        '<div><div class="jmeta-v">' + fund.toLocaleString('ar') + '</div><div class="jmeta-k">الصندوق</div></div>' +
        '<div><div class="jmeta-v">' + months.length + '</div><div class="jmeta-k">شهراً</div></div>' +
      '</div>' +
      '<div class="pbar"><div class="pbar-f" style="width:' + stats.pct + '%"></div></div>' +
      '<div class="pbar-row"><span class="pbar-pct">' + stats.pct + '%</span><span class="pbar-fr">' + stats.paid + '/' + stats.total + ' دفعة</span></div>';
    div.addEventListener('click', function() { openDetail(j); });
    list.appendChild(div);
  });
}

/* ── CREATE ── */
function renderMembers() {
  var html = '';
  mbrs.forEach(function(m, i) {
    html += '<div class="mrow"><div class="midx">' + (i+1) + '</div>' +
      '<input type="text" value="' + m + '" placeholder="اسم العضو ' + (i+1) + '" oninput="mbrs[' + i + ']=this.value" autocomplete="off">' +
      (mbrs.length > 2 ? '<div class="mdel" onclick="delMbr(' + i + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>' : '') +
      '</div>';
  });
  document.getElementById('mlist').innerHTML = html;
}
function addMember() { mbrs.push(''); renderMembers(); }
function delMbr(i) { mbrs.splice(i, 1); renderMembers(); }

async function createJam() {
  var name = document.getElementById('f-name').value.trim();
  var amount = parseFloat(document.getElementById('f-amount').value);
  var start = document.getElementById('f-start').value;
  var members = mbrs.map(function(m) { return m.trim(); }).filter(Boolean);
  if (!name) { showToast('أدخل اسم الجمعية'); return; }
  if (!amount || amount <= 0) { showToast('أدخل مبلغاً صحيحاً'); return; }
  if (!start) { showToast('اختر شهر البداية'); return; }
  if (members.length < 2) { showToast('أضف عضوين على الأقل'); return; }
  var btn = document.getElementById('btn-create');
  btn.disabled = true; btn.textContent = 'جاري الحفظ...';
  var res = await sb.from('jamiya').insert({ name: name, amount: amount, start_month: start, members: members }).select().single();
  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>إنشاء الجمعية';
  if (res.error) { showToast('خطأ: ' + res.error.message); return; }
  showToast('تم إنشاء الجمعية ✓');
  mbrs = ['','',''];
  renderMembers();
  document.getElementById('f-name').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-start').value = '';
  nav('home');
}

/* ── DETAIL ── */
async function openDetail(j) {
  curJam = j; isEditMode = false;
  document.getElementById('bn-home').classList.remove('on');
  document.getElementById('bn-create').classList.remove('on');
  var startD = new Date(j.start_month + '-01');
  setTop(j.name, MN[startD.getMonth()] + ' ' + startD.getFullYear(), true);
  showPage('detail');
  window.scrollTo(0, 0);
  document.getElementById('pg-detail').innerHTML = '<div class="loader"><div class="spin"></div>جاري التحميل...</div>';
  var res = await sb.from('payments').select('*').eq('jamiya_id', j.id);
  payCache = {};
  (res.data || []).forEach(function(p) { payCache[p.month_index + '_' + p.member_index] = p.paid; });
  renderDetail();
}

function renderDetail() {
  var j = curJam;
  var months = buildMonths(j);
  var fund = (j.members.length - 1) * j.amount;
  var displayCache = isEditMode ? editCache : payCache;
  var stats = calcStats(j, months, displayCache);
  var startD = new Date(j.start_month + '-01');
  var endD = new Date(j.start_month + '-01');
  endD.setMonth(endD.getMonth() + months.length - 1);

  var rows = '';
  months.forEach(function(mo, mi) {
    var allDone = j.members.every(function(_, xi) { return xi === mo.receiver || displayCache[mi + '_' + xi]; });
    var label = (allDone ? '<span class="ok-dot"></span>' : '') + MN[mo.month - 1] + ' ' + mo.year;
    var cells = '';
    j.members.forEach(function(_, xi) {
      if (xi === mo.receiver) {
        cells += '<td><span class="rcv">مستلم</span></td>';
      } else {
        var paid = displayCache[mi + '_' + xi];
        var changed = isEditMode && (editCache[mi + '_' + xi] !== payCache[mi + '_' + xi]);
        var cls = isEditMode ? 'pcell edit-mode' + (changed ? ' changed' : '') : 'pcell view-mode';
        var onclick = isEditMode ? ' onclick="toggleEdit(' + mi + ',' + xi + ')"' : '';
        cells += '<td><span class="' + cls + '" id="pc-' + mi + '-' + xi + '"' + onclick + '>' + (paid ? '✅' : '⬜') + '</span></td>';
      }
    });
    rows += '<tr><td>' + label + '</td>' + cells + '</tr>';
  });

  var thCells = j.members.map(function(m) { return '<th>' + m + '</th>'; }).join('');

  var actionBtns = isEditMode
    ? '<div class="thead-actions">' +
        '<button class="btn-cancel" onclick="cancelEdit()">إلغاء</button>' +
        '<button class="btn-save" id="btn-save" onclick="saveEdit()">' +
          '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>حفظ' +
        '</button>' +
      '</div>'
    : '<button class="btn-edit" onclick="startEdit()">' +
        '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
        'تعديل' +
      '</button>';

  var bannerHtml = '<div class="edit-banner' + (isEditMode ? ' on' : '') + '">' +
    '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
    'وضع التعديل — اضغط على الخانة لتغييرها ثم احفظ' +
    '</div>';

  document.getElementById('pg-detail').innerHTML =
    '<div class="dtop">' +
      '<div class="dtop-name">' + j.name + '</div>' +
      '<div class="dtop-sub">' + MN[startD.getMonth()] + ' ' + startD.getFullYear() + ' — ' + MN[endD.getMonth()] + ' ' + endD.getFullYear() + '</div>' +
    '</div>' +
    '<div class="sgrid">' +
      '<div class="sbox"><div class="sbox-n">' + j.members.length + '</div><div class="sbox-l">أعضاء</div></div>' +
      '<div class="sbox teal"><div class="sbox-n">' + fund.toLocaleString('ar') + '</div><div class="sbox-l">الصندوق الشهري</div></div>' +
      '<div class="sbox"><div class="sbox-n">' + Number(j.amount).toLocaleString('ar') + '</div><div class="sbox-l">مبلغ العضو</div></div>' +
      '<div class="sbox teal"><div class="sbox-n">' + stats.pct + '%</div><div class="sbox-l">نسبة الإنجاز</div></div>' +
    '</div>' +
    '<div class="tblock">' +
      '<div class="thead-row"><div class="thead-t">جدول الدفعات</div>' + actionBtns + '</div>' +
      bannerHtml +
      '<div class="twrap"><table>' +
        '<thead><tr><th>الشهر</th>' + thCells + '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>' +
    '</div>' +
    '<button class="btn-del" onclick="deleteJam()">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>' +
      'حذف الجمعية' +
    '</button>';
}

/* ── EDIT MODE ── */
function startEdit() {
  isEditMode = true;
  // copy payCache into editCache
  editCache = {};
  var j = curJam;
  var months = buildMonths(j);
  months.forEach(function(mo, mi) {
    j.members.forEach(function(_, xi) {
      if (xi !== mo.receiver) {
        editCache[mi + '_' + xi] = payCache[mi + '_' + xi] || false;
      }
    });
  });
  renderDetail();
}

function cancelEdit() {
  isEditMode = false;
  editCache = {};
  renderDetail();
}

function toggleEdit(mi, xi) {
  if (!isEditMode) return;
  var key = mi + '_' + xi;
  editCache[key] = !editCache[key];
  renderDetail();
}

async function saveEdit() {
  var btn = document.getElementById('btn-save');
  if (btn) { btn.disabled = true; btn.textContent = 'جاري الحفظ...'; }

  // find changed keys
  var changed = [];
  var j = curJam;
  var months = buildMonths(j);
  months.forEach(function(mo, mi) {
    j.members.forEach(function(_, xi) {
      if (xi !== mo.receiver) {
        var key = mi + '_' + xi;
        if (editCache[key] !== (payCache[key] || false)) {
          changed.push({ jamiya_id: j.id, month_index: mi, member_index: xi, paid: editCache[key] });
        }
      }
    });
  });

  if (!changed.length) {
    showToast('لا توجد تغييرات');
    isEditMode = false;
    editCache = {};
    renderDetail();
    return;
  }

  var res = await sb.from('payments').upsert(changed, { onConflict: 'jamiya_id,month_index,member_index' });
  if (res.error) {
    showToast('خطأ في الحفظ');
    if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>حفظ'; }
    return;
  }

  // commit to payCache
  changed.forEach(function(c) { payCache[c.month_index + '_' + c.member_index] = c.paid; });
  isEditMode = false;
  editCache = {};
  showToast('تم الحفظ ✓');
  renderDetail();
}

async function deleteJam() {
  if (!confirm('حذف هذه الجمعية نهائياً؟')) return;
  var res = await sb.from('jamiya').delete().eq('id', curJam.id);
  if (res.error) { showToast('خطأ في الحذف'); return; }
  showToast('تم الحذف');
  isEditMode = false;
  curJam = null;
  nav('home');
}

renderMembers();
loadHome();
</script>
</body>
</html>
