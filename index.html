<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>جمعيتي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0D0D0D;--ink3:#888;
  --paper:#F5F4F0;--white:#FFF;
  --teal:#00C9A7;--teal-dk:#009E84;--teal-bg:#E6FAF7;
  --red:#FF4757;--red-bg:#FFF0F1;
  --amber:#FFAA00;--amber-bg:#FFF8E6;
  --line:#E8E6E0;--r:16px;--rs:10px;
}
html,body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--paper);color:var(--ink)}
.shell{max-width:430px;width:100%;margin:0 auto}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 16px 10px;display:flex;align-items:center;gap:10px;background:var(--paper);max-width:430px;margin:0 auto;border-bottom:1px solid var(--line)}
.topbar-spacer{height:58px}
.tb-back{width:36px;height:36px;border-radius:50%;background:var(--white);border:1px solid var(--line);display:none;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--ink)}
.tb-back.on{display:flex}
.tb-title{font-size:19px;font-weight:700;color:var(--ink);flex:1}
.tb-sub{font-size:12px;color:var(--ink3)}
.tb-user{display:none;align-items:center;gap:6px;cursor:pointer;background:var(--teal-bg);border:1px solid #99EAD8;border-radius:99px;padding:5px 10px}
.tb-user-name{font-size:11px;font-weight:700;color:var(--teal-dk)}
.tb-user svg{width:14px;height:14px;stroke:var(--teal-dk);stroke-width:2;fill:none}

/* BODY */
.body{overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 14px 20px;min-height:100vh}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;background:var(--white);border-top:1.5px solid var(--line);padding-bottom:env(safe-area-inset-bottom,0px)}
.bnav-spacer{height:calc(70px + env(safe-area-inset-bottom,0px))}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0;border:none;background:none;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:10px;font-weight:600;color:var(--ink3)}
.bnav-btn svg{width:22px;height:22px}
.bnav-btn.on{color:var(--teal-dk)}
.bnav-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);display:none;margin-top:1px}
.bnav-btn.on .bnav-dot{display:block}

/* PAGES */
.page{display:none}.page.on{display:block}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:12px;color:var(--ink3);font-size:14px}
.spin{width:28px;height:28px;border:2.5px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH PAGE */
#pg-auth{position:fixed;inset:0;z-index:500;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
#pg-auth.hidden{display:none}
.auth-logo{font-size:13px;font-weight:700;color:var(--teal-dk);letter-spacing:1.5px;margin-bottom:6px}
.auth-title{font-size:28px;font-weight:700;color:var(--ink);margin-bottom:6px;text-align:center}
.auth-sub{font-size:13px;color:var(--ink3);margin-bottom:28px;text-align:center}
.auth-box{background:var(--white);border:1px solid var(--line);border-radius:20px;padding:22px 18px;width:100%;max-width:380px}
.auth-err{background:var(--red-bg);border:1px solid #FFD0D4;border-radius:10px;padding:10px 13px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}
.auth-err.on{display:block}
.auth-phone-display{font-size:16px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:16px;padding:10px;background:var(--paper);border-radius:var(--rs)}
.otp-input{text-align:center;font-size:26px;letter-spacing:10px;font-weight:700;padding:14px}

/* KPI */
.kpi{background:var(--ink);border-radius:20px;padding:20px 18px;margin-bottom:16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(0,201,167,.1);top:-50px;left:-50px}
.kpi-eye{font-size:10px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1.2px;margin-bottom:6px}
.kpi-n{font-size:44px;font-weight:700;color:var(--white);line-height:1;margin-bottom:3px}
.kpi-d{font-size:12px;color:rgba(255,255,255,.5)}
.kpi-chips{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.kpi-chip{background:rgba(255,255,255,.1);border-radius:99px;padding:4px 11px;font-size:11px;color:rgba(255,255,255,.7)}
.kpi-chip b{color:var(--teal)}
.sec-lbl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.8px;margin-bottom:9px}

/* JAM CARD */
.jcard{background:var(--white);border-radius:var(--r);padding:15px;margin-bottom:10px;cursor:pointer;border:1px solid var(--line);position:relative;overflow:hidden;transition:transform .12s;-webkit-user-select:none;user-select:none}
.jcard:active{transform:scale(.98)}
.jcard-bar{position:absolute;top:0;right:0;width:4px;height:100%;background:var(--teal)}
.jcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.jcard-name{font-size:15px;font-weight:700}
.jcard-pill{background:var(--teal-bg);color:var(--teal-dk);font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px}
.jcard-meta{display:flex;gap:14px;margin-bottom:11px}
.jmeta-v{font-size:14px;font-weight:700}
.jmeta-k{font-size:10px;color:var(--ink3);font-weight:500;margin-top:1px}
.pbar{height:4px;background:var(--line);border-radius:99px;overflow:hidden}
.pbar-f{height:100%;background:var(--teal);border-radius:99px}
.pbar-row{display:flex;justify-content:space-between;margin-top:5px}
.pbar-pct{font-size:11px;font-weight:700;color:var(--teal-dk)}
.pbar-fr{font-size:11px;color:var(--ink3)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px}
.empty-c{width:68px;height:68px;border-radius:50%;background:var(--white);border:1px solid var(--line);margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.empty-c svg{width:30px;height:30px;stroke:var(--ink3);stroke-width:1.5;fill:none}
.empty-h{font-size:16px;font-weight:700;margin-bottom:5px}
.empty-p{font-size:13px;color:var(--ink3);line-height:1.6}

/* FORM */
.fblock{background:var(--white);border-radius:var(--r);border:1px solid var(--line);margin-bottom:12px;overflow:hidden}
.fblock-head{padding:13px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.fblock-icon{width:28px;height:28px;border-radius:8px;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fblock-icon svg{width:15px;height:15px;stroke:var(--teal-dk);stroke-width:2;fill:none}
.fblock-title{font-size:13px;font-weight:700}
.fblock-body{padding:14px}
.field{margin-bottom:13px}.field:last-child{margin-bottom:0}
.flabel{font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:5px;letter-spacing:.4px}
.finput{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:var(--rs);background:var(--paper);color:var(--ink);font-size:15px;font-family:'IBM Plex Sans Arabic',sans-serif;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
.finput:focus{border-color:var(--teal);background:var(--white)}
.finput::placeholder{color:var(--ink3);font-size:14px}
.mlist{display:flex;flex-direction:column;gap:7px;margin-bottom:11px}
.mrow{display:flex;gap:7px;align-items:center}
.midx{width:27px;height:27px;border-radius:7px;background:var(--paper);border:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink3)}
.mrow input{flex:1;padding:10px 11px;border:1.5px solid var(--line);border-radius:var(--rs);background:var(--paper);color:var(--ink);font-size:14px;font-family:'IBM Plex Sans Arabic',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .15s}
.mrow input:focus{border-color:var(--teal);background:var(--white)}
.mdel{width:33px;height:33px;border-radius:8px;background:var(--red-bg);border:1px solid #FFD0D4;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.mdel svg{width:14px;height:14px;stroke:var(--red);stroke-width:2;fill:none}
.btn-add{width:100%;padding:11px;border:1.5px dashed var(--teal);border-radius:var(--rs);background:var(--teal-bg);color:var(--teal-dk);font-size:13px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:13px}
.btn-add svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}
.btn-main{width:100%;padding:15px;border:none;border-radius:var(--r);background:var(--ink);color:var(--white);font-size:15px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;-webkit-appearance:none;transition:opacity .15s}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.btn-main svg{width:17px;height:17px;stroke:var(--white);stroke-width:2;fill:none}

/* DETAIL */
.dtop{background:var(--ink);border-radius:20px;padding:22px 18px;margin-bottom:14px}
.dtop-name{font-size:21px;font-weight:700;color:var(--white);margin-bottom:3px}
.dtop-sub{font-size:12px;color:rgba(255,255,255,.45)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.sbox{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px}
.sbox-n{font-size:22px;font-weight:700;color:var(--ink)}
.sbox-l{font-size:10px;color:var(--ink3);font-weight:600;margin-top:2px}
.sbox.teal .sbox-n{color:var(--teal-dk)}

/* TABLE */
.tblock{background:var(--white);border-radius:var(--r);border:1px solid var(--line);overflow:hidden;margin-bottom:14px}
.thead-row{padding:13px 15px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px}
.thead-t{font-size:13px;font-weight:700;flex:1}
.btn-edit{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:99px;border:1.5px solid var(--line);background:var(--white);color:var(--ink);font-size:12px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;white-space:nowrap}
.btn-edit svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
.btn-save{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:99px;border:none;background:var(--teal);color:var(--white);font-size:12px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;white-space:nowrap}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-save svg{width:13px;height:13px;stroke:var(--white);stroke-width:2.5;fill:none}
.btn-cancel{display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:99px;border:1.5px solid var(--line);background:var(--white);color:var(--ink3);font-size:12px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;white-space:nowrap}
.thead-actions{display:flex;gap:6px;align-items:center}
.edit-banner{background:var(--amber-bg);border-bottom:1px solid #FFE0A0;padding:8px 15px;font-size:12px;color:#8a6000;font-weight:600;display:none;align-items:center;gap:6px}
.edit-banner.on{display:flex}
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:220px}
th{background:var(--paper);padding:9px 7px;text-align:center;font-size:10px;font-weight:700;color:var(--ink3);border-bottom:1px solid var(--line);white-space:nowrap}
th:first-child{text-align:right;padding-right:13px;min-width:90px}
td{padding:11px 7px;text-align:center;border-bottom:1px solid var(--line);font-size:12px}
td:first-child{text-align:right;padding-right:13px;font-weight:600;white-space:nowrap;font-size:11px}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#FAFAF8}
.pcell{font-size:20px;line-height:1;display:block;padding:4px;border-radius:6px}
.pcell.view-mode{cursor:default}
.pcell.edit-mode{cursor:pointer}
.pcell.edit-mode:active{background:rgba(0,201,167,.15)}
.pcell.changed{background:rgba(0,201,167,.12)}
.rcv{background:var(--amber-bg);color:#8a6000;font-size:10px;font-weight:700;padding:3px 6px;border-radius:5px;border:1px solid #ffd97d;display:inline-block;white-space:nowrap}
.ok-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--teal);margin-left:4px;vertical-align:2px}

/* BUTTONS */
.btn-print{width:100%;padding:13px;border-radius:var(--r);background:var(--teal-bg);border:1px solid #99EAD8;color:var(--teal-dk);font-size:14px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px;-webkit-appearance:none}
.btn-print svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}
.btn-del{width:100%;padding:13px;border-radius:var(--r);background:var(--red-bg);border:1px solid #FFD0D4;color:var(--red);font-size:14px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:24px;-webkit-appearance:none}
.btn-del svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}
.btn-logout{width:100%;padding:13px;border-radius:var(--r);background:var(--paper);border:1px solid var(--line);color:var(--ink3);font-size:14px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;margin-bottom:24px}
.btn-logout svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}

/* TOAST */
#toast{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--white);padding:9px 18px;border-radius:99px;font-size:13px;font-weight:600;font-family:'IBM Plex Sans Arabic',sans-serif;opacity:0;pointer-events:none;z-index:9999;white-space:nowrap;transition:opacity .2s,transform .2s;box-shadow:0 3px 16px rgba(0,0,0,.22)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="shell">

  <!-- AUTH PAGE -->
  <div id="pg-auth">
    <div class="auth-logo">JAMIYA</div>
    <div class="auth-title">جمعيتي</div>
    <div class="auth-sub" id="auth-sub">سجّل أو ادخل لحسابك</div>

    <!-- Tab switcher -->
    <div style="display:flex;gap:0;background:var(--line);border-radius:12px;padding:4px;width:100%;max-width:380px;margin-bottom:18px">
      <button id="tab-login" onclick="switchTab('login')" style="flex:1;padding:9px;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:var(--white);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1)">تسجيل دخول</button>
      <button id="tab-register" onclick="switchTab('register')" style="flex:1;padding:9px;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:transparent;color:var(--ink3)">حساب جديد</button>
    </div>

    <div class="auth-box">
      <div class="auth-err" id="auth-err"></div>

      <!-- Step 1: Phone (login) -->
      <div id="auth-step1-login">
        <div class="field">
          <label class="flabel">رقم الجوال</label>
          <input class="finput" id="auth-phone-login" type="tel" placeholder="05XXXXXXXX" inputmode="numeric" autocomplete="tel">
        </div>
        <div id="recaptcha-container-login" style="margin-bottom:14px;display:flex;justify-content:center"></div>
        <button class="btn-main" id="auth-btn-login" onclick="sendOTP('login')">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.05 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
          إرسال رمز التحقق
        </button>
      </div>

      <!-- Step 1: Phone + Name (register) -->
      <div id="auth-step1-register" style="display:none">
        <div class="field">
          <label class="flabel">الاسم</label>
          <input class="finput" id="auth-name-register" type="text" placeholder="محمد العمري" autocomplete="name">
        </div>
        <div class="field">
          <label class="flabel">رقم الجوال</label>
          <input class="finput" id="auth-phone-register" type="tel" placeholder="05XXXXXXXX" inputmode="numeric" autocomplete="tel">
        </div>
        <div id="recaptcha-container-register" style="margin-bottom:14px;display:flex;justify-content:center"></div>
        <button class="btn-main" id="auth-btn-register" onclick="sendOTP('register')">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.05 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
          إنشاء الحساب وإرسال الرمز
        </button>
      </div>

      <!-- Step 2: OTP (shared) -->
      <div id="auth-step2" style="display:none">
        <div class="auth-phone-display" id="auth-phone-display"></div>
        <div class="field">
          <label class="flabel">رمز التحقق (6 أرقام)</label>
          <input class="finput otp-input" id="auth-otp" type="text" placeholder="● ● ● ● ● ●" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
        </div>
        <button class="btn-main" id="auth-btn2" onclick="verifyOTP()">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          تأكيد الدخول
        </button>
        <button onclick="backToPhone()" style="width:100%;margin-top:10px;padding:10px;border:none;background:none;color:var(--ink3);font-size:13px;font-family:inherit;cursor:pointer">← تغيير رقم الجوال</button>
      </div>
    </div>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <button class="tb-back" id="tb-back" onclick="goBack()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div style="flex:1;min-width:0">
      <div class="tb-title" id="tb-title">جمعيتي</div>
      <div class="tb-sub" id="tb-sub-bar"></div>
    </div>
    <div class="tb-user" id="tb-user" onclick="doLogout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="tb-user-name" id="tb-user-name"></span>
    </div>
  </div>
  <div class="topbar-spacer"></div>

  <div class="body">
    <!-- HOME -->
    <div class="page" id="pg-home">
      <div class="kpi">
        <div class="kpi-eye">JAMIYA</div>
        <div class="kpi-n" id="kpi-n">—</div>
        <div class="kpi-d" id="kpi-d">جاري التحميل...</div>
        <div class="kpi-chips" id="kpi-chips"></div>
      </div>
      <div class="sec-lbl">جمعياتي</div>
      <div id="jlist"><div class="loader"><div class="spin"></div>جاري التحميل...</div></div>
      <div id="empty-home" class="empty" style="display:none">

var HMN=['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
function toHijri(gy,gm,gd){
  var a=Math.floor((14-gm)/12),y=gy+4800-a,m=gm+12*a-3;
  var jdn=gd+Math.floor((153*m+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;
  var l=jdn-1948440+10632,n=Math.floor((l-1)/10631);
  l=l-10631*n+354;
  var j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
  l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  var hm=Math.floor((24*l)/709),hd=l-Math.floor((709*hm)/24),hy=30*n+j-30;
  return{year:hy,month:hm,day:hd};
}
function hijriToGreg(hy,hm){
  var jdn=Math.floor((11*hy+3)/30)+354*hy+30*hm-Math.floor((hm-1)/2)+1+1948440-385;
  var l=jdn+68569,n=Math.floor((4*l)/146097);
  l=l-Math.floor((146097*n+3)/4);
  var i=Math.floor((4000*(l+1))/1461001);
  l=l-Math.floor((1461*i)/4)+31;
  var j=Math.floor((80*l)/2447);
  var gd=l-Math.floor((2447*j)/80);
  l=Math.floor(j/11);
  var gm2=j+2-12*l,gy2=100*(n-49)+i+l;
  return{year:gy2,month:gm2,day:gd};
}
function hLabel(gy,gm){
  var h=toHijri(gy,gm,1);
  return HMN[h.month-1]+' '+h.year+' هـ';
}

}

}

/* ── PHONE FORMAT ── */
function formatPhone(p){
  p=p.trim().replace(/\s/g,'');
  if(p.startsWith('05'))return'+966'+p.slice(1);
  if(p.startsWith('5')&&p.length===9)return'+966'+p;
  if(p.startsWith('966'))return'+'+p;
  if(!p.startsWith('+'))return'+966'+p;
  return p;
}

function setupRecaptcha(tab){
  var containerId='recaptcha-container-'+tab;

    recaptchaVerifiers[tab]=new firebase.auth.RecaptchaVerifier(containerId,{
      size:'normal',
      callback:function(){},
      'expired-callback':function(){resetRecaptcha(tab);}
    });
    recaptchaVerifiers[tab].render();
  }
}

function resetRecaptcha(tab){
  if(recaptchaVerifiers[tab]){
    try{recaptchaVerifiers[tab].clear();}catch(ex){}
    recaptchaVerifiers[tab]=null;
  }
  var el=document.getElementById('recaptcha-container-'+tab);
  if(el)el.innerHTML='';
  setupRecaptcha(tab);
}

/* ── HELPERS ── */
function buildMonths(j){
  return j.members.map(function(_,i){
    var d=new Date(j.start_month+'-01');d.setMonth(d.getMonth()+i);
    return{year:d.getFullYear(),month:d.getMonth()+1,receiver:i};
  });
}
function calcStats(j,months,cache){
  var total=months.length*(j.members.length-1),paid=0;
  months.forEach(function(mo,mi){
    j.members.forEach(function(_,xi){
      if(xi!==mo.receiver&&cache[mi+'_'+xi])paid++;
    });
  });
  return{total:total,paid:paid,pct:total?Math.round(paid/total*100):0};
}

    document.getElementById('kpi-chips').innerHTML='';

  var ids=jams.map(function(j){return j.id;});

  list.innerHTML='';empty.style.display='none';
  jams.forEach(function(j){

    months.forEach(function(mo,mi){j.members.forEach(function(_,xi){lc[mi+'_'+xi]=pm[j.id+'_'+mi+'_'+xi]||false;});});

        '<div><div class="jmeta-v">'+months.length+'</div><div class="jmeta-k">شهراً</div></div>'+
      '</div>'+
      '<div class="pbar"><div class="pbar-f" style="width:'+st.pct+'%"></div></div>'+
      '<div class="pbar-row"><span class="pbar-pct">'+st.pct+'%</span><span class="pbar-fr">'+st.paid+'/'+st.total+' دفعة</span></div>';

}

        '<input type="tel" value="'+m.phone+'" placeholder="05XXXXXXXX" inputmode="numeric" oninput="newMembers['+i+'].phone=this.value" style="width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:var(--rs);background:var(--paper);color:var(--ink);font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none">'+
      '</div>'+
      (newMembers.length>2?'<div class="mdel" onclick="delMbr('+i+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>':'')+
    '</div>';
  });
  document.getElementById('mlist').innerHTML=html;
}
function addMember(){newMembers.push({name:'',phone:''});renderMembers();}
function delMbr(i){newMembers.splice(i,1);renderMembers();}

async function createJam(){
  var name=document.getElementById('f-name').value.trim();
  var amount=parseFloat(document.getElementById('f-amount').value);
  var start=getStartMonth();
  var members=newMembers.filter(function(m){return m.name.trim()&&m.phone.trim();});
  if(!name){toast('أدخل اسم الجمعية');return;}
  if(!amount||amount<=0){toast('أدخل مبلغاً صحيحاً');return;}
  if(!start){toast('اختر شهر البداية');return;}
  if(members.length<2){toast('أضف عضوين على الأقل (اسم + رقم جوال)');return;}
  var btn=document.getElementById('btn-create');
  btn.disabled=true;btn.textContent='جاري الحفظ...';
  var memberNames=members.map(function(m){return m.name.trim();});
  var res=await sb.from('jamiya').insert({
    name:name,amount:amount,start_month:start,
    members:memberNames,owner_phone:currentPhone
  }).select().single();
  if(res.error){toast('خطأ: '+res.error.message);btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>إنشاء الجمعية';return;}
  toast('تم إنشاء الجمعية ✓');
  newMembers=[{name:'',phone:''},{name:'',phone:''}];
  renderMembers();
  document.getElementById('f-name').value='';
  document.getElementById('f-amount').value='';
  document.getElementById('f-hijri-month').value='';
  populateHijriYears();
  btn.disabled=false;
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>إنشاء الجمعية';
  nav('home');
}

/* ── DETAIL ── */
async function openDetail(j){
  curJam=j;isEdit=false;
  document.getElementById('bn-home').classList.remove('on');
  document.getElementById('bn-create').classList.remove('on');
  var sd=new Date(j.start_month+'-01');
  setTop(j.name,hLabel(sd.getFullYear(),sd.getMonth()+1),true);
  showPage('detail');window.scrollTo(0,0);
  document.getElementById('pg-detail').innerHTML='<div class="loader"><div class="spin"></div>جاري التحميل...</div>';
  var res=await sb.from('payments').select('*').eq('jamiya_id',j.id);
  payCache={};
  (res.data||[]).forEach(function(p){payCache[p.month_index+'_'+p.member_index]=p.paid;});
  renderDetail();
}

function renderDetail(){
  var j=curJam,months=buildMonths(j);
  var fund=(j.members.length-1)*j.amount;
  var dc=isEdit?editCache:payCache;
  var st=calcStats(j,months,dc);
  var sd=new Date(j.start_month+'-01');
  var ed=new Date(j.start_month+'-01');ed.setMonth(ed.getMonth()+months.length-1);
  var rows='';
  months.forEach(function(mo,mi){
    var allDone=j.members.every(function(_,xi){return xi===mo.receiver||dc[mi+'_'+xi];});
    var label=(allDone?'<span class="ok-dot"></span>':'')+hLabel(mo.year,mo.month);
    var cells='';
    j.members.forEach(function(_,xi){
      if(xi===mo.receiver){cells+='<td><span class="rcv">مستلم</span></td>';return;}
      var paid=dc[mi+'_'+xi];
      var changed=isEdit&&(editCache[mi+'_'+xi]!==(payCache[mi+'_'+xi]||false));
      var cls='pcell '+(isEdit?'edit-mode'+(changed?' changed':''):'view-mode');
      var oc=isEdit?' onclick="toggleEdit('+mi+','+xi+')"':'';
      cells+='<td><span class="'+cls+'" id="pc-'+mi+'-'+xi+'"'+oc+'>'+(paid?'✅':'⬜')+'</span></td>';
    });
    rows+='<tr><td>'+label+'</td>'+cells+'</tr>';
  });
  var thCells=j.members.map(function(m){return'<th>'+m+'</th>';}).join('');
  var actions=isEdit
    ?'<div class="thead-actions"><button class="btn-cancel" onclick="cancelEdit()">إلغاء</button><button class="btn-save" id="btn-save" onclick="saveEdit()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>حفظ</button></div>'
    :'<button class="btn-edit" onclick="startEdit()"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>تعديل</button>';
  var banner='<div class="edit-banner'+(isEdit?' on':'')+'">⚠ وضع التعديل — اضغط على الخانة ثم احفظ</div>';
  document.getElementById('pg-detail').innerHTML=
    '<div class="dtop"><div class="dtop-name">'+j.name+'</div><div class="dtop-sub">'+hLabel(sd.getFullYear(),sd.getMonth()+1)+' — '+hLabel(ed.getFullYear(),ed.getMonth()+1)+'</div></div>'+
    '<div class="sgrid">'+
      '<div class="sbox"><div class="sbox-n">'+j.members.length+'</div><div class="sbox-l">أعضاء</div></div>'+
      '<div class="sbox teal"><div class="sbox-n">'+fund.toLocaleString('ar')+'</div><div class="sbox-l">الصندوق الشهري</div></div>'+
      '<div class="sbox"><div class="sbox-n">'+Number(j.amount).toLocaleString('ar')+'</div><div class="sbox-l">مبلغ العضو</div></div>'+
      '<div class="sbox teal"><div class="sbox-n">'+st.pct+'%</div><div class="sbox-l">نسبة الإنجاز</div></div>'+
    '</div>'+
    '<div class="tblock">'+
      '<div class="thead-row"><div class="thead-t">جدول الدفعات</div>'+actions+'</div>'+
      banner+
      '<div class="twrap"><table><thead><tr><th>الشهر</th>'+thCells+'</tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '</div>'+
    '<button class="btn-print" onclick="printPDF()"><svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>طباعة / تصدير PDF</button>'+
    '<button class="btn-del" onclick="deleteJam()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>حذف الجمعية</button>';
}

/* ── EDIT MODE ── */
function startEdit(){
  isEdit=true;editCache={};
  var j=curJam,months=buildMonths(j);
  months.forEach(function(mo,mi){
    j.members.forEach(function(_,xi){
      if(xi!==mo.receiver)editCache[mi+'_'+xi]=payCache[mi+'_'+xi]||false;
    });
  });
  renderDetail();
}
function cancelEdit(){isEdit=false;editCache={};renderDetail();}
function toggleEdit(mi,xi){
  if(!isEdit)return;
  editCache[mi+'_'+xi]=!editCache[mi+'_'+xi];
  renderDetail();
}
async function saveEdit(){
  var btn=document.getElementById('btn-save');
  if(btn){btn.disabled=true;btn.textContent='جاري الحفظ...';}
  var j=curJam,months=buildMonths(j),changed=[];
  months.forEach(function(mo,mi){
    j.members.forEach(function(_,xi){
      if(xi!==mo.receiver&&editCache[mi+'_'+xi]!==(payCache[mi+'_'+xi]||false)){
        changed.push({jamiya_id:j.id,month_index:mi,member_index:xi,paid:editCache[mi+'_'+xi]});
      }
    });
  });
  if(!changed.length){toast('لا توجد تغييرات');isEdit=false;editCache={};renderDetail();return;}
  var res=await sb.from('payments').upsert(changed,{onConflict:'jamiya_id,month_index,member_index'});
  if(res.error){toast('خطأ في الحفظ');if(btn){btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>حفظ';}return;}
  changed.forEach(function(c){payCache[c.month_index+'_'+c.member_index]=c.paid;});
  isEdit=false;editCache={};toast('تم الحفظ ✓');renderDetail();
}

/* ── PRINT PDF ── */
function printPDF(){
  var j=curJam,months=buildMonths(j);
  var fund=(j.members.length-1)*j.amount;
  var st=calcStats(j,months,payCache);
  var sd=new Date(j.start_month+'-01');
  var ed=new Date(j.start_month+'-01');ed.setMonth(ed.getMonth()+months.length-1);
  var rows='';
  months.forEach(function(mo,mi){
    var allDone=j.members.every(function(_,xi){return xi===mo.receiver||payCache[mi+'_'+xi];});
    var cells='';
    j.members.forEach(function(_,xi){
      if(xi===mo.receiver){cells+='<td style="text-align:center;background:#FFF8E6;color:#8a6000;font-size:10px;font-weight:700">مستلم</td>';}
      else{cells+='<td style="text-align:center;font-size:16px">'+(payCache[mi+'_'+xi]?'✅':'⬜')+'</td>';}
    });
    rows+='<tr style="background:'+(allDone?'#f0fdf4':'#fff')+'"><td style="padding:8px 10px;font-size:11px;font-weight:600;white-space:nowrap">'+(allDone?'✓ ':'')+hLabel(mo.year,mo.month)+'</td>'+cells+'</tr>';
  });
  var ths=j.members.map(function(m){return'<th style="background:#f5f4f0;padding:9px 7px;font-size:11px;font-weight:700;color:#888;text-align:center;border-bottom:1px solid #E8E6E0;white-space:nowrap">'+m+'</th>';}).join('');
  var win=window.open('','_blank');
  if(!win){toast('السماح بفتح نوافذ منبثقة');return;}
  win.document.write('<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>'+j.name+'</title>');
  win.document.write('<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">');
  win.document.write('<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"IBM Plex Sans Arabic",sans-serif;padding:20px;color:#0D0D0D}');
  win.document.write('.hdr{background:#0D0D0D;color:#fff;border-radius:12px;padding:18px 22px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}');
  win.document.write('.hdr-name{font-size:20px;font-weight:700}.hdr-sub{font-size:11px;opacity:.5;margin-top:3px}.hdr-logo{font-size:10px;font-weight:700;color:#00C9A7;letter-spacing:1px}');
  win.document.write('.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}');
  win.document.write('.box{border:1px solid #E8E6E0;border-radius:10px;padding:11px;text-align:center}.box-n{font-size:20px;font-weight:700;color:#009E84}.box-l{font-size:10px;color:#888;margin-top:2px;font-weight:600}');
  win.document.write('.pb-wrap{margin-bottom:18px}.pb-row{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:5px}');
  win.document.write('.pb{height:7px;background:#E8E6E0;border-radius:99px;overflow:hidden}.pb-f{height:100%;background:#00C9A7;border-radius:99px}');
  win.document.write('table{width:100%;border-collapse:collapse}td{padding:9px 7px;border-bottom:1px solid #F0F0F0}tr:last-child td{border-bottom:none}');
  win.document.write('.foot{margin-top:16px;text-align:center;font-size:11px;color:#ccc}');
  win.document.write('@media print{body{padding:10px}.hdr,.pb-f{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body>');
  win.document.write('<div class="hdr"><div><div class="hdr-name">'+j.name+'</div><div class="hdr-sub">'+hLabel(sd.getFullYear(),sd.getMonth()+1)+' — '+hLabel(ed.getFullYear(),ed.getMonth()+1)+'</div></div><div class="hdr-logo">JAMIYA</div></div>');
  win.document.write('<div class="grid">');
  win.document.write('<div class="box"><div class="box-n">'+j.members.length+'</div><div class="box-l">أعضاء</div></div>');
  win.document.write('<div class="box"><div class="box-n">'+Number(j.amount).toLocaleString('ar')+'</div><div class="box-l">مبلغ العضو</div></div>');
  win.document.write('<div class="box"><div class="box-n">'+fund.toLocaleString('ar')+'</div><div class="box-l">الصندوق الشهري</div></div>');
  win.document.write('<div class="box"><div class="box-n">'+st.pct+'%</div><div class="box-l">نسبة الإنجاز</div></div>');
  win.document.write('</div>');
  win.document.write('<div class="pb-wrap"><div class="pb-row"><span>نسبة الدفعات</span><span>'+st.paid+' من '+st.total+' دفعة</span></div><div class="pb"><div class="pb-f" style="width:'+st.pct+'%"></div></div></div>');
  win.document.write('<table><thead><tr><th style="background:#f5f4f0;padding:9px 10px;font-size:11px;font-weight:700;color:#888;text-align:right;border-bottom:1px solid #E8E6E0">الشهر</th>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>');
  win.document.write('<div class="foot">جمعيتي — تقرير تلقائي</div></body></html>');
  win.document.close();
  setTimeout(function(){win.print();},700);
}

/* ── DELETE ── */
async function deleteJam(){
  if(!confirm('حذف هذه الجمعية نهائياً؟'))return;
  var res=await sb.from('jamiya').delete().eq('id',curJam.id);
  if(res.error){toast('خطأ في الحذف');return;}
  toast('تم الحذف');isEdit=false;curJam=null;nav('home');
}

/* ── INIT ── */
window.addEventListener('load',function(){
  setupRecaptcha('login');
  setupRecaptcha('register');
  // hide register tab initially
  document.getElementById('auth-step1-register').style.display='none';
  populateHijriYears();
  renderMembers();
});
</script>
